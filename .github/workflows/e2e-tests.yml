name: E2E Tests SIMAK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── STEP 1: Checkout repository code ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── STEP 2: Install Node.js & cache node_modules ──────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── STEP 3: Install all dependencies (reproducible) ───────────────
      - name: Install dependencies
        run: npm ci

      # ── STEP 4: Cache Playwright binaries ─────────────────────────────
      - name: Cache Playwright binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      # ── STEP 5: Install Chromium browser / system dependencies ────────
      - name: Install Playwright Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system dependencies only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── STEP 6: Set up SSH tunnel to database VPS ─────────────────────
      - name: Set up SSH tunnel to DB VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          echo "[1] Creating .ssh directory..."
          mkdir -p ~/.ssh

          echo "[2] Writing private key..."
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "    Key size: $(wc -c < ~/.ssh/id_rsa) bytes"

          echo "[3] Pre-connectivity check on ${SSH_HOST}:${SSH_PORT}..."
          if ! nc -zv -w 10 "$SSH_HOST" "$SSH_PORT" 2>&1; then
            echo "    ERROR: Cannot reach ${SSH_HOST}:${SSH_PORT}"
            echo "    Check that:"
            echo "      - Secret SSH_HOST is correct"
            echo "      - Secret SSH_PORT matches the VPS SSH port (default 22)"
            echo "      - The VPS firewall allows inbound connections on that port"
            exit 1
          fi
          echo "    Host reachable on port ${SSH_PORT}"

          echo "[4] Running ssh-keyscan..."
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>&1 \
            || echo "    ssh-keyscan failed — continuing with StrictHostKeyChecking=no"
          echo "    known_hosts: $(wc -l < ~/.ssh/known_hosts) lines"

          echo "[5] Testing SSH authentication..."
          ssh -i ~/.ssh/id_rsa \
              -p "$SSH_PORT" \
              -v \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -o StrictHostKeyChecking=no \
              "${SSH_USER}@${SSH_HOST}" \
              "echo 'SSH auth OK'" > /tmp/ssh-test.log 2>&1
          SSH_EXIT=$?
          cat /tmp/ssh-test.log
          if [ $SSH_EXIT -ne 0 ]; then
            echo "[5] FAILED — see verbose log above"
            exit 1
          fi
          echo "[5] Authentication successful"

          echo "[6] Opening SSH tunnel..."
          ssh -i ~/.ssh/id_rsa \
              -p "$SSH_PORT" \
              -L 5432:localhost:5432 \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=10 \
              -o StrictHostKeyChecking=no \
              -N -f \
              "${SSH_USER}@${SSH_HOST}"

          sleep 3
          echo "[6] SSH tunnel is active"

      # ── STEP 7: Verify tunnel is open ─────────────────────────────────
      - name: Verify tunnel connection
        run: |
          nc -z localhost 5432 && echo "Port 5432 is open via tunnel" || exit 1

      # ── STEP 8: Write .env.test from GitHub Secrets ───────────────────
      - name: Write .env.test file
        env:
          DB_URL: ${{ secrets.DATABASE_URL }}
          BASE_URL: ${{ secrets.TEST_BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          ADMIN_PWD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          STUDENT_EMAIL: ${{ secrets.TEST_STUDENT_EMAIL }}
          STUDENT_PWD: ${{ secrets.TEST_STUDENT_PASSWORD }}
          LECTURER_EMAIL: ${{ secrets.TEST_LECTURER_EMAIL }}
          LECTURER_PWD: ${{ secrets.TEST_LECTURER_PASSWORD }}
        run: |
          cat > .env.test << ENVEOF
          DATABASE_URL=$DB_URL
          TEST_BASE_URL=$BASE_URL
          TEST_ADMIN_EMAIL=$ADMIN_EMAIL
          TEST_ADMIN_PASSWORD=$ADMIN_PWD
          TEST_STUDENT_EMAIL=$STUDENT_EMAIL
          TEST_STUDENT_PASSWORD=$STUDENT_PWD
          TEST_LECTURER_EMAIL=$LECTURER_EMAIL
          TEST_LECTURER_PASSWORD=$LECTURER_PWD
          ENVEOF

      # ── STEP 9: Run API tests ──────────────────────────────────────────
      - name: Run API tests
        run: npm run test:api
        env:
          CI: true

      # ── STEP 10: Run UI tests ──────────────────────────────────────────
      - name: Run UI tests
        run: npm run test:ui:clean
        env:
          CI: true

      # ── STEP 11: Upload test reports as artifact ───────────────────────
      - name: Upload test reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-reports-${{ github.run_number }}
          path: |
            playwright-report-api/
            playwright-report-ui/
            test-results/
          retention-days: 14

      # ── STEP 12: Deploy reports to GitHub Pages ────────────────────────
      - name: Deploy reports to GitHub Pages
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npx gh-pages \
            -d playwright-report-api \
            --dest api \
            --dotfiles \
            --repo "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          npx gh-pages \
            -d playwright-report-ui \
            --dest ui \
            --dotfiles \
            --repo "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

      # ── STEP 13: Close SSH tunnel (cleanup) ───────────────────────────
      - name: Close SSH tunnel
        if: always()
        run: |
          pkill -f "ssh -i ~/.ssh/id_rsa -L 5432:localhost:5432" || true
